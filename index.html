<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0F0E0C" />
  <meta name="description" content="Bibliothèque personnelle de prompts, tutoriels IA et skills." />

  <title>Bibliothèque de prompts</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/svg+xml" href="assets/icons/icon.svg" />
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <main class="app">
    <header class="app__header">
      <div class="app__brand">Biblio<span>·</span>prompts</div>
      <div class="app__header-right">
        <div class="app__status" id="status" aria-live="polite">chargement…</div>
        <button class="btn" id="open-gen">Générateur</button>
		<button id="btn-deploy" class="btn btn--outline" title="Exporter et déployer">
		⬆ Déployer
		</button>
        <button class="btn btn--accent" id="new-entry">+ Nouvelle</button>
      </div>
    </header>

    <section class="search" role="search">
      <input
        id="search"
        class="search__input"
        type="search"
        placeholder="Chercher un prompt, un tag, un tuto…"
        autocomplete="off"
        autocapitalize="off"
        spellcheck="false"
        aria-label="Chercher" />
    </section>

    <section class="results" id="results" aria-live="polite">
      <div class="empty" id="empty">Rien encore. La recherche arrive à l'étape 3.</div>
    </section>
  </main>

  <script src="js/app.js" type="module"></script>
</body>
</html>
